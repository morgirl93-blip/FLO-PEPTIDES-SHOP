<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peptide Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; margin: 0; padding: 15px; color: #333; }
        .header { text-align: center; padding: 20px 0; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; border-radius: 12px; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .card img { width: 100%; border-radius: 8px; height: 120px; object-fit: cover; background: #eee; }
        .price { color: #2ecc71; font-weight: bold; margin: 5px 0; }
        .name { font-size: 0.9em; height: 35px; overflow: hidden; font-weight: bold; }
        .mg { font-size: 0.8em; color: #777; }
        button { background: #0088cc; color: white; border: none; padding: 8px 15px; border-radius: 20px; width: 100%; margin-top: 10px; cursor: pointer; }
        .cart-bar { position: fixed; 
    bottom: 20px; /* Moves it up away from the screen edge */
    left: 10px; 
    right: 10px; 
    background: #0088cc; 
    color: white; 
    padding: 18px; 
    text-align: center; 
    display: none; /* This stays hidden until you add an item */
    font-weight: bold; 
    border-radius: 50px; /* Makes it look like a floating pill button */
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    z-index: 9999;
}
    </style>
</head>
<body>

    <div class="header">
        <h2>Peptide Catalog</h2>
    </div>

    <div id="catalog" class="product-grid">
        <p>Loading peptides...</p>
    </div>

    <div id="cart-bar" class="cart-bar" onclick="sendOrder()">
        View Order & Send to Chat
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Opens the app to full height

        // 🟢 REPLACE THIS URL with your Google Web App URL
        const API_URL = "https://script.google.com/macros/s/AKfycbyOJa0TSm1oUJyx8NfrVrbNI8SPC35BBUHihv-5XciHoP7lE0t-rnoxGvDAkTFxK0Cd/exec";

        let cart = [];

        // Fetch products from Google Sheets
        async function loadProducts() {
            try {
                const response = await fetch(API_URL);
                const products = await response.json();
                const catalog = document.getElementById('catalog');
                catalog.innerHTML = '';

                products.forEach(p => {
                    catalog.innerHTML += `
                        <div class="card">
                            <img src="${p.imageUrl}" onerror="this.src='https://via.placeholder.com/150'">
                            <div class="name">${p.name}</div>
                            <div class="mg">${p.mg}</div>
                            <div class="price">RM ${p.price}</div>
                            <button onclick="addToCart('${p.code}', ${p.price})">Add to Order</button>
                        </div>
                    `;
                });
            } catch (e) {
                document.getElementById('catalog').innerHTML = "Error loading products.";
            }
        }

        function addToCart(code, price) {
            cart.push({code, price});
            document.getElementById('cart-bar').style.display = 'block';
            document.getElementById('cart-bar').innerText = `Order (${cart.length} items) - RM ${cart.reduce((a, b) => a + b.price, 0)}`;
        }

        function sendOrder() {
            const total = cart.reduce((a, b) => a + b.price, 0);
            const summary = cart.map(i => i.code).join(", ");
            
            // This sends the data back to your Telegram Bot
            tg.sendData(JSON.stringify({
                customerName: tg.initDataUnsafe.user?.first_name || "Customer",
                itemsOrdered: summary,
                totalPrice: total
            }));
            
            tg.close();
        }

        loadProducts();
    </script>
</body>
</html>
